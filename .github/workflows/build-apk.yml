name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Instalar dependências
        run: |
          npm install
          npm install -g @capacitor/cli

      - name: Sincronizar Capacitor
        run: npx @capacitor/cli sync android

      - name: Permissão de execução do Gradle
        run: chmod +x android/gradlew

      - name: Gerar APK (debug)
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Publicar APK gerado
        uses: actions/upload-artifact@v4
        with:
          name: ControleRemotoPC-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk